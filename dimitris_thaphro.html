html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;

* { box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  color: #fff;
  overflow-x: hidden;
}

#slideshow-container {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: -2;
  overflow: hidden;
}

.slideshow-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transition: opacity 1.5s ease-in-out;
  opacity: 0;
}

.slideshow-image.active {
  opacity: 1;
}

/* Gradient overlay */
#bg-overlay {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45));
  z-index: -1;
}

/* HEADER AREA */
header.topbar {

  justify-content: center;
  align-items: center;
  padding: 70px 80px;
  width: 100%;
  position: relative;
  z-index: 5;
  pointer-events: auto;
}

.nav-all {
  display: flex;
  align-items: center;
  gap: 60px;
}

.nav-item, .nav-item-hidden {
  font-size: 13px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-weight: 400;
  color: rgba(255,255,255,0.9);
  text-decoration: none;
  transition: color 0.18s;
}

.nav-item:hover { color: #fff; }

.center-slot {

<script>
const images = [
  "images/hp1.jpg",
  "images/hp2.jpg",
  "images/hp3.jpg"
];

const slides = document.querySelectorAll(".slideshow-image");
let current = 0;

slides[0].style.backgroundImage = `url('${images[0]}')`;
slides[1].style.backgroundImage = `url('${images[1]}')`;

setInterval(() => {
  const next = (current + 1) % images.length;

  const currentSlide = slides[current % 2];
  const nextSlide =   slides[(current + 1) % 2];

  nextSlide.style.backgroundImage = `url('${images[next]}')`;

  currentSlide.classList.remove("active");
  nextSlide.classList.add("active");

  current = next;

}, 5000);
</script>
